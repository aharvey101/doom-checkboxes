<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Checkboxes</title>
    <!-- Preload Doom WASM so it's cached when user clicks Play -->
    <link rel="preload" href="doom.wasm" as="fetch" crossorigin>
    <!-- Doom WASM (jacobenget/doom.wasm) -->
    <link data-trunk rel="rust" data-bin="checkbox-frontend" data-wasm-opt="z" />
    <link data-trunk rel="copy-file" href="doom.wasm" />
    <link data-trunk rel="copy-file" href="doom-jacobenget.js" />
    <link data-trunk rel="copy-file" href="doom-mode.js" />
    <!-- Worker files -->
    <link data-trunk rel="copy-dir" href="pkg/worker" />
    <link data-trunk rel="copy-file" href="worker-loader.js" />
    <script src="doom-jacobenget.js"></script>
    <script src="doom-mode.js"></script>
    <script>
        // Expose test functions to window for e2e tests
        window.addEventListener('TrunkApplicationStarted', () => {
            if (window.wasmBindings && window.wasmBindings.test_send_batch_update) {
                window.test_send_batch_update = window.wasmBindings.test_send_batch_update;
            }
            if (window.wasmBindings && window.wasmBindings.get_render_version) {
                window.get_render_version = window.wasmBindings.get_render_version;
            }
            if (window.wasmBindings && window.wasmBindings.get_doom_chunk_nonzero_count) {
                window.get_doom_chunk_nonzero_count = window.wasmBindings.get_doom_chunk_nonzero_count;
            }
        });
    </script>
</head>
<body>
    <div id="app"></div>
    <!-- Doom container (will be created by doom-mode.js if needed) -->
</body>
</html>
