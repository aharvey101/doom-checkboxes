[build]
  base = "typescript-frontend/"
  command = "npm ci && npm run build"
  publish = "dist/"

[build.environment]
  NODE_VERSION = "18"
  VITE_SPACETIMEDB_URL = "https://your-spacetimedb-backend.clockworklabs.io"

[[headers]]
  for = "/*"
  [headers.values]
     Content-Security-Policy = "default-src 'self'; connect-src 'self' wss: ws:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200