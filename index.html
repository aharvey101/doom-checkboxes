<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collaborative Checkboxes</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { margin: 0 0 10px 0; font-size: 1.5rem; }
    .status {
      margin-bottom: 20px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      display: inline-block;
    }
    .status.connecting { background: #f39c12; color: #000; }
    .status.connected { background: #27ae60; color: #fff; }
    .status.error { background: #e74c3c; color: #fff; }
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(50, 22px);
      gap: 2px;
    }
    .checkbox-grid input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: #3498db;
    }
    .checkbox-grid input[type="checkbox"]:checked {
      accent-color: #2ecc71;
    }
    .stats {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Collaborative Checkboxes</h1>
  <div id="status" class="status connecting">Connecting...</div>
  <div id="checkbox-grid" class="checkbox-grid"></div>
  <div id="stats" class="stats"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
